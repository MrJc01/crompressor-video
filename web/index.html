<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CROM Web Testnet</title>
    <style>
        body {
            background-color: #0b0b0f;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }
        .monitor {
            width: 800px;
            height: 450px;
            border: 2px solid #00f0ff;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
            overflow: hidden;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>CROM WebAssembly Testnet (0 Codecs)</h1>
    <p>O quadro abaixo está sendo alimentado puramente pela Tag &lt;crom-video&gt; acoplada a VRAM Hash</p>
    
    <div class="monitor">
        <!-- The Magical WebComponent -->
        <!-- O data-hashes simula um filme pequenininho. Um vídeo com 30 quadros sendo: Hash ID = 42 (O que o nosso WASM mocka como Branco puro) -->
        <crom-video 
            data-hashes="42,42,42,42,42,42,42,42,42,42,42,42,42,42,42,42,42,42,42,42,42,42,42,42" 
            brain-url="fake_hibrido.gob">
        </crom-video>
    </div>

    <script src="wasm_exec.js"></script>
    <script src="crom-player.js"></script>
</body>
</html>
