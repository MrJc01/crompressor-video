<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CROM WebGPU Dashboard (Cinemark Era)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050507;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(112, 0, 255, 0.05), transparent 25%);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .dashboard {
            background: rgba(15, 15, 20, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px;
            width: 90%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .dashboard::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            background: linear-gradient(45deg, #00f0ff, #7000ff);
            z-index: -1;
            border-radius: 17px;
            opacity: 0.15;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -0px;
            background: linear-gradient(90deg, #ffffff, #888888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sre-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #00f0ff;
            background: rgba(0, 240, 255, 0.1);
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            animation: pulse-glow 2s infinite;
        }

        .monitor-frame {
            display: flex;
            justify-content: center;
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0,0,0,1);
        }

        /* O glow do monitor reflete a cor do terminal */
        .monitor-glow {
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 20px rgba(0, 240, 255, 0.1);
            pointer-events: none;
            z-index: 10;
        }

        .stats-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.25rem;
            color: #fff;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 240, 255, 0.1); }
            50% { box-shadow: 0 0 20px rgba(0, 240, 255, 0.3); }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <header>
            <div>
                <h1>CROM WEB NATIVE</h1>
                <p style="color: #666; margin-top: 5px;">Módulo de Rendering O(1) Descentralizado</p>
            </div>
            <div class="sre-badge">SECURE. WGPU READY.</div>
        </header>

        <main class="monitor-frame">
            <div class="monitor-glow"></div>
            <!-- O Engine: Aponta pro arquivo gerado localmente pelo CLI (Encode) -->
            <crom-video 
                src="cine_video.crom" 
                brain="cine_brain.gob">
            </crom-video>
        </main>

        <div class="stats-panel">
            <div class="stat-card">
                <span class="stat-label">Pipeline</span>
                <span class="stat-value" style="color: #00f0ff;">WASM/IndexedDB</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Memória (DNA Loader)</span>
                <span class="stat-value">Persistent (Cold)</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Decoders Tradicionais</span>
                <span class="stat-value" style="color: #ff3366;">0.00%</span>
            </div>
        </div>
    </div>

    <!-- SDKs -->
    <script src="wasm_exec.js"></script>
    <script src="crom-player.js"></script>

</body>
</html>
